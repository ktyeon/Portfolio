<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="header.js" defer></script>
    <script src="https://kit.fontawesome.com/b72ae05b11.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --text-color: #f0f4f5;
            --background-color: #46C2CB;
            --accent-color: #f0f4f5;
        }

        /* menubar */
        body {
            margin: 0;
            font-family: 'Source sans pro';
        }

        a {
            text-decoration: none;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--background-color);
            padding: 8px 12px;
        }

        .navbar__logo {
            font-size: 20px;
            color: white;
            display: flex;
            align-items: center;
        }

        .navbar__logo i {
            color: white;
            margin-right: 5px;
        }

        .navbar__menu {
            display: flex;
            list-style: none;
            padding-left: 0;
        }

        .navbar__menu li {
            padding: 8px 12px;
        }

        .navbar__menu li:hover {
            background-color: lightblue;
            border-radius: 4px;
        }

        .navbar__icons {
            list-style: none;
            color: white;
            display: flex;
        }

        .navbar__icons li {
            padding: 8px 12px;
        }

        .navbar__toggleBtn{
            display: none;
            position: absolute;
            right: 32px;
            font-size: 24px;
            cursor: pointer;
            color: whtie;
        }

        @media screen and (max-width: 768px) {
           
            .navbar {
                flex-direction: column;
                align-items: flex-start;
                padding: 8px 24px;
               
            }

            .navbar__toggleBtn {
                display: block;
                position: absolute; /* Change to relative positioning */
                margin-top: 8px; /* Add some top margin for spacing */
            }


            .navbar__menu {
                display: none;
                flex-direction: column;
                align-items: center;
                width: 100%;
                margin-top: 10px; /* Add margin at the top */
            }

            .navbar__menu li {
                width: 100%;
                text-align: center;
                padding: 10px 0; /* Adjust vertical padding as needed */
            }

            .navbar__icons {
                display: none;
                justify-content: center;
                width: 100%;
            }

            .navbar__toggleBtn{
                display: block;
            }

            .navbar__menu.active,
            .navbar__icons.active{
                display: flex;
            }
           
        }

       
    </style>

    <title>Main</title>
</head>

<body>
    <!-- logo -->
    <nav class="navbar" id="header">
        <div class="navbar__logo">
            <i class="fa-solid fa-battery-full"></i>
            <a href="../index.html">Taeyeon Portfolio</a>
        </div>

        <!-- hamburger menu -->
        
        <a href="#" class="navbar__toggleBtn">
            <i class="fa-solid fa-bars"></i>
        </a>
  

        <!-- menu -->
        <div class="navbar__menu">
            <li><a href="card.html">Card</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="cSharpProject.html">C# Project</a></li>
            <li><a href="webSocket.html">WebSocket Project</a></li>
            <li><a href="reactProject.html">React.js Project</a></li>
            <li><a href="project.html">Project</a></li>
            <li><a href="speedGame.html">Reaction Speed Test</a></li>
            <li><a href="contact.html">Contact</a></li>
        </div>

        <!-- github, linkedin -->
        <div class="navbar__icons">
            <li><a href="https://www.linkedin.com/in/7-taeyeon-kim/"><i class="fa-brands fa-linkedin"></i></a></li>
            <li><a href="https://github.com/ktyeon"><i class="fa-brands fa-square-github"></i></a></li>
        </div>
    </nav>
</body>

</html>
