<!DOCTYPE html>
<html lang="en">

<head>
  <title>Taeyeon Kim Project Portfolio</title>
  <style>
    /* Set up the experiment */
    html, body {
      height: 100%;
      margin: 0;
      font-family: "Source Sans Pro", Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #46C2CB; /* Mint color */
      color: #453C67; /* Dark gray color */
    }

    .Words {
      list-style-type: none;
      padding: 0;
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      overflow: hidden;
      font-size: 33px;
    }

    .Words-line {
      height: 60px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      transition: all 0.4s ease-in-out;
    }

    p {
      height: 70px;
      line-height: 65px;
      padding: 0 10px;
      vertical-align: top;
      white-space: nowrap;
      z-index: 1; /* Ensure the text is above the background */
    }

    .highlight {
      background-color: #F2F7A1; /* Light yellowish color */
      color: #453C67; /* Dark gray color */
    }

    .Words-line:nth-child(odd) {
      transform: skew(60deg, -30deg) scaleY(0.66667);
    }

    .Words-line:nth-child(even) {
      transform: skew(0deg, -30deg) scaleY(1.33333);
    }

    .Words:hover .Words-line {
      color: #46C2CB; /* Mint color on hover */
    }

    .Words:hover .Words-line:nth-child(3) {
      height: 70px;
      opacity: 1;
    }

    /* Additional Styles */
    i.fa-regular.fa-computer-mouse {
      font-size: 30px;
      margin-left: 10px;
      transition: all 0.3s ease-in-out;
      align-items: flex;
    }

    a.enter-link {
      text-decoration: none;
      color: #453C67; /* Dark gray color */
      font-weight: bold;
      font-size: 20px;
      padding: 10px 20px;
      border-radius: 5px;
      transition: all 0.3s ease-in-out;
      display: flex;
      align-items: center;
      margin-top: 20px;
      border: 2px solid #453C67; /* Dark gray color border */
      width: 100px;
      height: 30px;
    }

    .Words:hover a.enter-link {
      background-color: #453C67; /* Dark gray color on hover */
      color: #46C2CB; /* Mint color on hover */
    }

    /* Styling for "Portfolio Taeyeon Kim" */
    .portfolio-text {
      background-color: #F2F7A1; /* Light yellowish color */
      color: #453C67; /* Dark gray color */
      padding: 0 10px;
      margin: 0;
      white-space: nowrap;
    }

    /* Responsive Styles */
    @media screen and (max-width: 768px) {
      .Words {
        font-size: 24px;
      }

      .Words-line {
        height: auto;
        margin-bottom: 10px;
      }

      p {
        line-height: normal;
      }

      a.enter-link {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <ul class="Words" id="Words">
    <li class="Words-line">
      <p>&nbsp;</p>
      <p>Project</p>
    </li>
    <li class="Words-line">
      <p class="highlight">Portfolio</p>
      <p>Website</p>
    </li>
    <li class="Words-line">
      <p>by</p>
      <p class="highlight">Taeyeon</p>
      <p class="highlight">Kim</p>
    </li>
    <li class="Words-line">
      <p>Project</p>
      <p>Portfolio</p>
    </li>
    <li class="Words-line">
      <p>Website</p>
      <p>by</p>
      <p>Taeyeon</p>
    </li>
    <li class="Words-line">
      <p>Project</p>
      <p>Portfolio</p>
    </li>
    <li class="Words-line">
      <p>Website</p>
      <p>by</p>
      <p>Taeyeon</p>
    </li>
    <li class="Words-line">
      <p>Project</p>
      <p>Portfolio</p>
    </li>
    <li class="Words-line">
      <p>Website</p>
      <p>by</p>
      <p>Taeyeon</p>
    </li>
    <br>
    <li>
      <i class="fa-regular fa-computer-mouse"></i>
      <a class="enter-link" href="./main/card.html">More→</a>
    </li>
  </ul>
</body>

</html>
